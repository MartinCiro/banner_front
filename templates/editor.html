<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BG Remover</title>
  <script src="https://unpkg.com/tailwindcss-cdn@3.4.10/tailwindcss-with-all-plugins.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
          colors: { ink: '#0e0e0e', paper: '#f5f3ee', accent: '#00c896', dim: '#2a2a2a' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/st.css">
</head>

<body class="min-h-screen text-white bg-ink overflow-x-hidden">

  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded text-sm font-mono bg-dim border border-white/10 max-w-[90vw] text-center">
  </div>

  <!-- Overlay para sidebar móvil -->
  <div id="sidebar-overlay"></div>

  <!-- Header -->
  <header
    class="border-b border-white/5 px-4 py-3 flex items-center justify-between sticky top-0 bg-ink/95 backdrop-blur-sm z-20">
    <div class="flex items-center gap-3">
      <!-- Botón menú móvil -->
      <button id="menu-toggle" class="mobile-only touch-target p-2 -ml-2 text-white/70 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="w-2 h-2 rounded-full bg-accent"></div>
      <span class="text-sm font-semibold tracking-widest uppercase text-white/90">BG Remover</span>
      <span class="tag hidden sm:inline">FastAPI + rembg</span>
    </div>
    <div id="status-bar" class="text-xs text-white/30">listo</div>
  </header>

  <div class="flex h-[calc(100vh-57px)]">

    <!-- ── Sidebar (Drawer en móvil) ── -->
    <aside id="sidebar"
      class="w-64 border-r border-white/5 flex flex-col overflow-y-auto shrink-0 bg-ink fixed md:static h-full md:h-auto">

      <!-- Header del sidebar móvil -->
      <div class="mobile-only flex items-center justify-between p-4 border-b border-white/5">
        <span class="text-sm font-semibold text-white/90">Herramientas</span>
        <button id="sidebar-close" class="touch-target p-2 text-white/50 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Imagen -->
      <section id="drop-zone" class="hidden">
        <input id="file-input" type="file" accept="image/*" class="hidden" />
      </section>

      <!-- Pincel -->
      <section class="p-4 border-b border-white/5">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Refinar máscara</p>

        <div class="flex gap-2 mb-4">
          <button id="tool-add" class="btn btn-ghost flex-1 text-xs touch-target" title="Atajo: A">
            <span class="hidden sm:inline">+ Añadir</span>
            <span class="sm:hidden">+</span>
            <span class="kbd hidden sm:inline">A</span>
          </button>
          <button id="tool-erase" class="btn btn-ghost flex-1 text-xs touch-target" title="Atajo: E">
            <span class="hidden sm:inline">− Borrar</span>
            <span class="sm:hidden">−</span>
            <span class="kbd hidden sm:inline">E</span>
          </button>
        </div>

        <label class="text-xs text-white/40 mb-1 block">
          Tamaño: <span id="brush-size-label">30</span>px
        </label>
        <input id="brush-size" type="range" min="10" max="100" value="30" step="10" class="w-full accent-accent" />
      </section>

      <!-- Historial -->
      <section class="p-4 border-b border-white/5">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Historial</p>
        <div class="flex gap-2">
          <button id="btn-undo" class="btn btn-ghost flex-1 text-xs touch-target" title="Ctrl+Z">↩</button>
          <button id="btn-redo" class="btn btn-ghost flex-1 text-xs touch-target" title="Ctrl+Y">↪</button>
        </div>
      </section>

      <!-- Exportar -->
      <section class="p-4">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Exportar</p>
        <button id="btn-export" class="btn btn-primary w-full text-xs touch-target mb-2" disabled>Descargar PNG</button>
      </section>

      <!-- Spacer para móvil -->
      <div class="mobile-only h-20"></div>
    </aside>

    <!-- ── Canvas ── -->
    <main class="flex-1 flex items-center justify-center p-2 sm:p-6 overflow-hidden relative" id="canvas-wrap">
      <!-- Estado vacío -->
      <div id="empty-state" class="text-center px-4">
        <svg class="mx-auto w-12 h-12 sm:w-16 sm:h-16 text-white/20 mb-3" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        <p class="text-white/40 text-sm">Arrastra una imagen o toca para comenzar</p>
      </div>

      <!-- Contenedor de canvas -->
      <div id="canvas-container" class="hidden relative shadow-2xl rounded-lg overflow-hidden touch-none"
        style="background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a1a1a 75%), linear-gradient(-45deg, transparent 75%, #1a1a1a 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #111;">
        <canvas id="canvas-main" class="block max-w-full max-h-full"></canvas>
        <canvas id="canvas-original" class="hidden"></canvas>
        <canvas id="canvas-mask" class="hidden"></canvas>
      </div>

      <div id="zoom-controls" class="zoom-controls hidden">
        <button id="zoom-out" class="zoom-btn" title="Zoom out (-)">−</button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button id="zoom-in" class="zoom-btn" title="Zoom in (+)">+</button>
        <button id="zoom-reset" class="zoom-btn reset-zoom" title="Reset zoom">Reset</button>
      </div>

      <button id="btn-replace-image" 
              class="hidden fixed z-30 px-4 py-2 bg-dim/90 backdrop-blur-sm border border-white/10 rounded-lg text-xs font-mono text-white/80 hover:text-white hover:border-accent/50 transition-all shadow-lg touch-target"
              style="top: 80px; right: 16px;"
              title="Reemplazar imagen">
        <span class="hidden sm:inline">🔄 Reemplazar imagen</span>
        <span class="sm:hidden">🔄</span>
      </button>

      <!-- Barra de herramientas flotante móvil -->
      <div class="mobile-only fixed bottom-4 left-4 right-4 z-10">
        <div
          class="bg-dim/90 backdrop-blur-sm rounded-xl border border-white/10 p-3 flex items-center justify-between gap-2">
          <button id="mobile-undo" class="btn btn-ghost touch-target px-3 py-2 text-xs" title="Deshacer">↩</button>
          <button id="mobile-redo" class="btn btn-ghost touch-target px-3 py-2 text-xs" title="Rehacer">↪</button>
        </div>
      </div>
      <div id="brush-cursor" class="pointer-events-none fixed z-50 hidden md:block"
        style="border: 2px solid #00c896; border-radius: 50%; transform: translate(-50%, -50%); mix-blend-mode: difference;">
      </div>
    </main>
  </div>

  <script src="/static/a.js"></script>

  <!-- INICIALIZACIÓN Y EVENT LISTENERS -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Referencias DOM
      const emptyState = document.getElementById('empty-state');
      const canvasContainer = document.getElementById('canvas-container');
      const canvasOriginal = document.getElementById('canvas-original');
      const canvasMask = document.getElementById('canvas-mask');
      const canvasMain = document.getElementById('canvas-main');
      const btnReplace = document.getElementById('btn-replace-image');
      const canvasWrap = document.getElementById('canvas-wrap');

      // Drag & Drop / File input
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      if (!canvasOriginal || !canvasMask || !canvasMain) return;

      const zoomControls = document.getElementById('zoom-controls');

      function handleFile(file, isReplace = false) {
        if (!file) return;
        editor.loadImage(file, isReplace);
        
        // Resetear input para permitir seleccionar el mismo archivo nuevamente
        fileInput.value = '';
        
        // Cerrar sidebar en móvil después de cargar
        if (window.innerWidth <= 768 && sidebar?.classList.contains('open')) {
          toggleSidebar();
        }
      }


      // Crear instancia del editor
      const editor = MaskEditor.create({
        originalCanvas: canvasOriginal,
        maskCanvas: canvasMask,
        mainCanvas: canvasMain,
        callbacks: {
          onToolChange: (tool) => {
            const addBtn = document.getElementById('tool-add');
            const eraseBtn = document.getElementById('tool-erase');
            if (addBtn && eraseBtn) {
              addBtn.classList.toggle('btn-active', tool === 'add');
              eraseBtn.classList.toggle('btn-active', tool === 'erase');
            }
          },
          onImageReady: (processed) => {
            // ✅ Mostrar controles de zoom
            if (zoomControls) zoomControls.classList.remove('hidden');

            const btnExport = document.getElementById('btn-export');
            if (btnExport) btnExport.disabled = !processed;

            if (emptyState && canvasContainer) {
              emptyState.classList.add('hidden');
              canvasContainer.classList.remove('hidden');
            }

            // ✅ Mostrar botón de reemplazo cuando hay imagen
            if (btnReplace) {
              btnReplace.classList.remove('hidden');
              btnReplace.classList.add('fade-in');
              // Remover clase de animación después de ejecutar
              setTimeout(() => btnReplace.classList.remove('fade-in'), 200);
            }

            if (!processed && editor.getState().file) processImageAutomatically();
          },
          onBrushChange: (size) => {
            const brushInput = document.getElementById('brush-size');
            if (brushInput && document.activeElement !== brushInput) {
              const label = document.getElementById('brush-size-label');
              if (label) label.textContent = size;
            }
          },
        }
      });

      window.editor = editor;

      // Toggle sidebar móvil
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const menuToggle = document.getElementById('menu-toggle');
      const sidebarClose = document.getElementById('sidebar-close');



      function toggleSidebar() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
        document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
      }

      menuToggle?.addEventListener('click', toggleSidebar);
      sidebarClose?.addEventListener('click', toggleSidebar);
      overlay?.addEventListener('click', toggleSidebar);

      

      if (dropZone && fileInput) {
        dropZone.addEventListener('click', () => fileInput.click());

        ['dragenter', 'dragover'].forEach(evt => {
          dropZone.addEventListener(evt, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('drag-over');
          });
        });

        ['dragleave', 'drop'].forEach(evt => {
          dropZone.addEventListener(evt, (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (evt === 'drop' && e.dataTransfer?.files?.[0]) {
              handleFile(e.dataTransfer.files[0], false);
            }
            dropZone.classList.remove('drag-over');
          });
        });

        fileInput.addEventListener('change', (e) => {
          if (e.target.files?.[0]) {
            // Determinar si es reemplazo según si ya hay imagen cargada
            const isReplace = !emptyState?.classList.contains('hidden');
            handleFile(e.target.files[0], isReplace);
          }
        });
      }
      if (emptyState && fileInput) {
        emptyState.style.cursor = 'pointer'; // Cambia el cursor para indicar que es clickable
        emptyState.addEventListener('click', () => {
          fileInput.click();
        });
      }

      if (canvasWrap) {
        ['dragenter', 'dragover'].forEach(evt => {
          canvasWrap.addEventListener(evt, (e) => {
            e.preventDefault();
            e.stopPropagation();
            // Solo mostrar feedback visual si no hay imagen o si es para reemplazar
            canvasContainer?.classList.add('drag-over-canvas');
          });
        });

        ['dragleave', 'drop'].forEach(evt => {
          canvasWrap.addEventListener(evt, (e) => {
            e.preventDefault();
            e.stopPropagation();
            canvasContainer?.classList.remove('drag-over-canvas');
            
            if (evt === 'drop' && e.dataTransfer?.files?.[0]) {
              const file = e.dataTransfer.files[0];
              if (file.type.startsWith('image/')) {
                // Si ya hay imagen, es reemplazo; si no, es carga inicial
                const hasImage = emptyState?.classList.contains('hidden');
                handleFile(file, hasImage);
              }
            }
          });
        });
      }

      if (btnReplace) {
        btnReplace.addEventListener('click', () => {
          fileInput.click();
        });
      }

      // Botones de herramienta
      const toolAdd = document.getElementById('tool-add');
      const toolErase = document.getElementById('tool-erase');

      toolAdd?.addEventListener('click', () => {
        if (editor.getState().tool !== 'add') editor.toggleTool();
        if (window.innerWidth <= 768) toggleSidebar();
      });
      toolErase?.addEventListener('click', () => {
        if (editor.getState().tool !== 'erase') editor.toggleTool();
        if (window.innerWidth <= 768) toggleSidebar();
      });

      // Controles de pincel
      const brushSize = document.getElementById('brush-size');

      if (brushSize) {
        brushSize.addEventListener('input', (e) => {
          const val = parseInt(e.target.value);
          editor.setBrushSize(val);  // ← Esto es lo que realmente cambia el pincel
          const label = document.getElementById('brush-size-label');
          if (label) label.textContent = val;
        });
      }

      // Historial
      const btnUndo = document.getElementById('btn-undo');
      const btnRedo = document.getElementById('btn-redo');
      const mobileUndo = document.getElementById('mobile-undo');
      const mobileRedo = document.getElementById('mobile-redo');

      const handleSidebarUndo = () => {
        editor.undo?.();
        if (window.innerWidth <= 768) toggleSidebar(); // Cierra sidebar después de acción
      };

      const handleSidebarRedo = () => {
        editor.redo?.();
        if (window.innerWidth <= 768) toggleSidebar();
      };

      // Handlers para botones de la BARRA FLOTANTE móvil
      const handleMobileUndo = () => { editor.undo?.(); };
      const handleMobileRedo = () => { editor.redo?.(); };

      // Asignar listeners correctos
      btnUndo?.addEventListener('click', handleSidebarUndo);
      btnRedo?.addEventListener('click', handleSidebarRedo);
      mobileUndo?.addEventListener('click', handleMobileUndo);
      mobileRedo?.addEventListener('click', handleMobileRedo);

      async function processImageAutomatically() {
        const state = editor.getState();
        if (!state.file) return;

        const statusBar = document.getElementById('status-bar');
        if (statusBar) statusBar.textContent = 'procesando…';

        try {
          const fd = new FormData();
          fd.append('file', state.file);

          const res = await fetch('/remove-bg', { method: 'POST', body: fd });
          const data = await res.json();

          if (!data.success) throw new Error(data.error);

          editor.setProcessedDataUrl(data.image);
          await editor.loadImage(data.image, true);

          const btnExport = document.getElementById('btn-export');
          if (btnExport) btnExport.disabled = false;
          if (statusBar) statusBar.textContent = 'listo';

          showToast('✓ Fondo eliminado');

        } catch (err) {
          console.error('Error:', err);
          showToast('✗ ' + err.message);
          if (statusBar) statusBar.textContent = 'error';
        }
      }

      function showToast(message) {
        const toast = document.getElementById('toast');
        if (toast) {
          toast.textContent = message;
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2500);
        }
      }

      // Exportar
      const btnExport = document.getElementById('btn-export');
      if (btnExport) {
        btnExport.addEventListener('click', async () => {
          const state = editor.getState();
          if (!state.isProcessed) return;

          const statusBar = document.getElementById('status-bar');
          if (statusBar) statusBar.textContent = 'exportando…';

          try {
            const res = await fetch('/apply-mask', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                original: state.processedDataUrl,
                mask: editor.getMaskDataUrl()
              })
            });
            const data = await res.json();

            if (data.success && data.image) {
              const a = document.createElement('a');
              a.href = data.image;
              a.download = 'sin_fondo.png';
              a.click();

              const toast = document.getElementById('toast');
              if (toast) {
                toast.textContent = '✓ PNG descargado';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
              }
            } else {
              throw new Error(data.error || 'Error desconocido');
            }
          } catch (err) {
            console.error('Error exportando:', err);
            const compositeUrl = editor.getCompositeDataUrl();
            if (compositeUrl) {
              const a = document.createElement('a');
              a.href = compositeUrl;
              a.download = 'sin_fondo_local.png';
              a.click();
            }
          }

          if (statusBar) statusBar.textContent = 'listo';
        });
      }
      document.getElementById('zoom-in')?.addEventListener('click', () => editor.zoomIn());
      document.getElementById('zoom-out')?.addEventListener('click', () => editor.zoomOut());
      document.getElementById('zoom-reset')?.addEventListener('click', () => editor.zoomReset());

      // Keyboard shortcuts (solo desktop)
      document.addEventListener('keydown', (e) => {
        if (window.innerWidth > 768) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          if (e.ctrlKey && e.key === 'z') {
            e.preventDefault();
            editor.undo?.();
          } else if (e.ctrlKey && e.key === 'y') {
            e.preventDefault();
            editor.redo?.();
          } else if (e.key.toLowerCase() === 'e') {
            if (editor.getState().tool !== 'erase') editor.toggleTool();
          } else if (e.key.toLowerCase() === 'a') {
            if (editor.getState().tool !== 'add') editor.toggleTool();
          } else if (e.key === '+' || e.key === '=') {
            e.preventDefault();
            editor.zoomIn();
          } else if (e.key === '-') {
            e.preventDefault();
            editor.zoomOut();
          } else if (e.key === '0') {
            e.preventDefault();
            editor.zoomReset();
          }
        }
      });

      // Cleanup
      window.addEventListener('beforeunload', () => editor.destroy());
      window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
          sidebar.classList.remove('open');
          overlay.classList.remove('active');
          document.body.style.overflow = '';
        }
      });
    });
  </script>
</body>

</html>
