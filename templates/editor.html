<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BG Remover</title>
  <script src="https://unpkg.com/tailwindcss-cdn@3.4.10/tailwindcss-with-all-plugins.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
          colors: { ink: '#0e0e0e', paper: '#f5f3ee', accent: '#00c896', dim: '#2a2a2a' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/st.css">
</head>

<body class="min-h-screen text-white bg-ink overflow-x-hidden">

  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded text-sm font-mono bg-dim border border-white/10 max-w-[90vw] text-center">
  </div>

  <!-- Overlay para sidebar móvil -->
  <div id="sidebar-overlay"></div>

  <!-- Header -->
  <header class="border-b border-white/5 px-4 py-3 flex items-center justify-between sticky top-0 bg-ink/95 backdrop-blur-sm z-20">
    <div class="flex items-center gap-3">
      <!-- Botón menú móvil -->
      <button id="menu-toggle" class="mobile-only touch-target p-2 -ml-2 text-white/70 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      
      <div class="w-2 h-2 rounded-full bg-accent"></div>
      <span class="text-sm font-semibold tracking-widest uppercase text-white/90">BG Remover</span>
      <span class="tag hidden sm:inline">FastAPI + rembg</span>
    </div>
    <div id="status-bar" class="text-xs text-white/30">listo</div>
  </header>

  <div class="flex h-[calc(100vh-57px)]">

    <!-- ── Sidebar (Drawer en móvil) ── -->
    <aside id="sidebar" class="w-64 border-r border-white/5 flex flex-col overflow-y-auto shrink-0 bg-ink fixed md:static h-full md:h-auto">

      <!-- Header del sidebar móvil -->
      <div class="mobile-only flex items-center justify-between p-4 border-b border-white/5">
        <span class="text-sm font-semibold text-white/90">Herramientas</span>
        <button id="sidebar-close" class="touch-target p-2 text-white/50 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Imagen -->
      <section class="p-4 border-b border-white/5">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Imagen</p>

        <div id="drop-zone" class="p-4 text-center cursor-pointer border-2 border-dashed border-white/10 rounded-lg hover:border-accent/50 transition-colors">
          <svg class="mx-auto mb-2 w-6 h-6 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          <p class="text-xs text-white/30">Toca para seleccionar</p>
          <p class="text-xs text-white/15 mt-1">PNG · JPG · WEBP</p>
        </div>

        <input id="file-input" type="file" accept="image/*" class="hidden" />

        <button id="btn-process" class="btn btn-primary w-full mt-3 touch-target" disabled>
          <span id="btn-process-label">Eliminar fondo</span>
          <div id="btn-spinner" class="spinner hidden"></div>
        </button>
      </section>

      <!-- Pincel -->
      <section class="p-4 border-b border-white/5">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Refinar máscara</p>

        <div class="flex gap-2 mb-4">
          <button id="tool-add" class="btn btn-ghost flex-1 text-xs touch-target" title="Atajo: A">
            <span class="hidden sm:inline">+ Añadir</span>
            <span class="sm:hidden">+</span>
            <span class="kbd hidden sm:inline">A</span>
          </button>
          <button id="tool-erase" class="btn btn-ghost flex-1 text-xs touch-target" title="Atajo: E">
            <span class="hidden sm:inline">− Borrar</span>
            <span class="sm:hidden">−</span>
            <span class="kbd hidden sm:inline">E</span>
          </button>
        </div>

        <label class="text-xs text-white/40 mb-1 block">Tamaño: <span id="brush-size-label">30</span>px</label>
        <input id="brush-size" type="range" min="2" max="120" value="30" class="w-full" />

        <label class="text-xs text-white/40 mt-3 mb-1 block">Opacidad: <span id="brush-opacity-label">100</span>%</label>
        <input id="brush-opacity" type="range" min="10" max="100" value="100" class="w-full" />

        <button id="mask-toggle" class="btn btn-ghost w-full mt-3 text-xs touch-target">
          <span id="mask-toggle-label">Ver máscara</span>
        </button>
      </section>

      <!-- Historial -->
      <section class="p-4 border-b border-white/5">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Historial</p>
        <div class="flex gap-2">
          <button id="btn-undo" class="btn btn-ghost flex-1 text-xs touch-target" title="Ctrl+Z">↩</button>
          <button id="btn-redo" class="btn btn-ghost flex-1 text-xs touch-target" title="Ctrl+Y">↪</button>
        </div>
      </section>

      <!-- Exportar -->
      <section class="p-4">
        <p class="text-xs text-white/40 uppercase tracking-widest mb-3">Exportar</p>
        <button id="btn-export" class="btn btn-primary w-full text-xs touch-target mb-2" disabled>Descargar PNG</button>
        <button id="btn-reset" class="btn btn-danger w-full text-xs touch-target">Resetear</button>
      </section>

      <!-- Spacer para móvil -->
      <div class="mobile-only h-20"></div>
    </aside>

    <!-- ── Canvas ── -->
    <main class="flex-1 flex items-center justify-center p-2 sm:p-6 overflow-hidden relative" id="canvas-wrap">
        <!-- Estado vacío -->
        <div id="empty-state" class="text-center px-4">
            <svg class="mx-auto w-12 h-12 sm:w-16 sm:h-16 text-white/20 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            <p class="text-white/40 text-sm">Arrastra una imagen o toca para comenzar</p>
        </div>
        
        <!-- Contenedor de canvas -->
        <div id="canvas-container" class="hidden relative shadow-2xl rounded-lg overflow-hidden touch-none" style="background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a1a1a 75%), linear-gradient(-45deg, transparent 75%, #1a1a1a 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #111;">
            <canvas id="canvas-main" class="block max-w-full max-h-full"></canvas>
            <canvas id="canvas-original" class="hidden"></canvas>
            <canvas id="canvas-mask" class="hidden"></canvas>
        </div>
        
        <!-- Barra de herramientas flotante móvil -->
        <div class="mobile-only fixed bottom-4 left-4 right-4 z-10">
          <div class="bg-dim/90 backdrop-blur-sm rounded-xl border border-white/10 p-3 flex items-center justify-between gap-2">
            <button id="mobile-undo" class="btn btn-ghost touch-target px-3 py-2 text-xs" title="Deshacer">↩</button>
            <button id="mobile-mask-toggle" class="btn btn-ghost touch-target px-3 py-2 text-xs flex-1">Máscara</button>
            <button id="mobile-redo" class="btn btn-ghost touch-target px-3 py-2 text-xs" title="Rehacer">↪</button>
          </div>
        </div>
    </main>
  </div>
  
  <script src="/static/a.js"></script>
  
  <!-- INICIALIZACIÓN Y EVENT LISTENERS -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Referencias DOM
        const emptyState = document.getElementById('empty-state');
        const canvasContainer = document.getElementById('canvas-container');
        const canvasOriginal = document.getElementById('canvas-original');
        const canvasMask = document.getElementById('canvas-mask');
        const canvasMain = document.getElementById('canvas-main');
        
        if (!canvasOriginal || !canvasMask || !canvasMain) return;
        
        // Crear instancia del editor
        const editor = MaskEditor.create({
            originalCanvas: canvasOriginal,
            maskCanvas: canvasMask,
            mainCanvas: canvasMain,
            callbacks: {
                onToolChange: (tool) => {
                    const addBtn = document.getElementById('tool-add');
                    const eraseBtn = document.getElementById('tool-erase');
                    if (addBtn && eraseBtn) {
                        addBtn.classList.toggle('btn-active', tool === 'add');
                        eraseBtn.classList.toggle('btn-active', tool === 'erase');
                    }
                },
                onImageReady: (processed) => {
                    const btnProcess = document.getElementById('btn-process');
                    const btnExport = document.getElementById('btn-export');
                    if (btnProcess) btnProcess.disabled = processed;
                    if (btnExport) btnExport.disabled = !processed;
                    
                    if (emptyState && canvasContainer) {
                        emptyState.classList.add('hidden');
                        canvasContainer.classList.remove('hidden');
                    }
                },
                onBrushChange: (size) => {
                    const label = document.getElementById('brush-size-label');
                    if (label) label.textContent = size;
                }
            }
        });
        
        window.editor = editor;
        
        // Toggle sidebar móvil
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }
        
        menuToggle?.addEventListener('click', toggleSidebar);
        sidebarClose?.addEventListener('click', toggleSidebar);
        overlay?.addEventListener('click', toggleSidebar);
        
        // Drag & Drop / File input
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        if (dropZone && fileInput) {
            dropZone.addEventListener('click', () => fileInput.click());
            
            ['dragenter', 'dragover'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('drag-over');
                });
            });
            
            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (evt === 'drop' && e.dataTransfer?.files?.[0]) {
                        editor.loadImage(e.dataTransfer.files[0], false);
                        setTimeout(processImageAutomatically, 100);
                    }
                    dropZone.classList.remove('drag-over');
                });
            });
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files?.[0]) {
                    editor.loadImage(e.target.files[0], false);
                    setTimeout(processImageAutomatically, 100);
                }
            });
        }
        
        // Botones de herramienta
        const toolAdd = document.getElementById('tool-add');
        const toolErase = document.getElementById('tool-erase');
        
        toolAdd?.addEventListener('click', () => {
            if (editor.getState().tool !== 'add') editor.toggleTool();
            if (window.innerWidth <= 768) toggleSidebar();
        });
        toolErase?.addEventListener('click', () => {
            if (editor.getState().tool !== 'erase') editor.toggleTool();
            if (window.innerWidth <= 768) toggleSidebar();
        });

        // Controles de pincel
        const brushSize = document.getElementById('brush-size');
        const brushOpacity = document.getElementById('brush-opacity');
        
        if (brushSize) {
            brushSize.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                editor.setBrushSize(val);
                const label = document.getElementById('brush-size-label');
                if (label) label.textContent = val;
            });
        }
        
        if (brushOpacity) {
            brushOpacity.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                editor.setBrushOpacity(val);
                const label = document.getElementById('brush-opacity-label');
                if (label) label.textContent = val;
            });
        }
        
        // Toggle máscara
        const maskToggle = document.getElementById('mask-toggle');
        const mobileMaskToggle = document.getElementById('mobile-mask-toggle');
        
        function handleMaskToggle() {
            const visible = editor.toggleMaskOverlay();
            const label = document.getElementById('mask-toggle-label');
            if (label) label.textContent = visible ? 'Ocultar máscara' : 'Ver máscara';
            if (mobileMaskToggle) mobileMaskToggle.textContent = visible ? 'Ocultar' : 'Mostrar';
        }
        
        maskToggle?.addEventListener('click', handleMaskToggle);
        mobileMaskToggle?.addEventListener('click', handleMaskToggle);
        
        // Historial
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const mobileUndo = document.getElementById('mobile-undo');
        const mobileRedo = document.getElementById('mobile-redo');
        
        const handleSidebarUndo = () => { 
            editor.undo?.(); 
            if (window.innerWidth <= 768) toggleSidebar(); // Cierra sidebar después de acción
        };

        const handleSidebarRedo = () => { 
            editor.redo?.(); 
            if (window.innerWidth <= 768) toggleSidebar();
        };

        // Handlers para botones de la BARRA FLOTANTE móvil (NO tocan el sidebar)
        const handleMobileUndo = () => { editor.undo?.(); };
        const handleMobileRedo = () => { editor.redo?.(); };

        // Asignar listeners correctos
        btnUndo?.addEventListener('click', handleSidebarUndo);   // Sidebar → cierra drawer
        btnRedo?.addEventListener('click', handleSidebarRedo);
        mobileUndo?.addEventListener('click', handleMobileUndo); // Floating bar → sin sidebar
        mobileRedo?.addEventListener('click', handleMobileRedo);

        async function processImageAutomatically() {
            const state = editor.getState();
            if (!state.file) return;
            
            const btnProcess = document.getElementById('btn-process');
            const label = document.getElementById('btn-process-label');
            const spinner = document.getElementById('btn-spinner');
            const statusBar = document.getElementById('status-bar');
            
            // UI: estado de procesamiento
            if (btnProcess) btnProcess.disabled = true;
            if (label) label.textContent = 'Procesando…';
            if (spinner) spinner.classList.remove('hidden');
            if (statusBar) statusBar.textContent = 'procesando…';
            
            try {
                const fd = new FormData();
                fd.append('file', state.file);
                
                const res = await fetch('/remove-bg', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (!data.success) throw new Error(data.error);
                
                editor.setProcessedDataUrl(data.image);
                await editor.loadImage(data.image, true);
                
                const btnExport = document.getElementById('btn-export');
                if (btnExport) btnExport.disabled = false;
                if (statusBar) statusBar.textContent = 'listo';
                
                showToast('✓ Fondo eliminado');
                
            } catch (err) {
                console.error('Error:', err);
                showToast('✗ ' + err.message);
                if (statusBar) statusBar.textContent = 'error';
            } finally {
                if (btnProcess) btnProcess.disabled = false;
                if (label) label.textContent = 'Eliminar fondo';
                if (spinner) spinner.classList.add('hidden');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
        }
        
        // Procesar imagen
        const btnProcess = document.getElementById('btn-process');
        if (btnProcess) {
            btnProcess.addEventListener('click', async () => {
                const state = editor.getState();
                if (!state.file) return;
                
                const btn = btnProcess;
                const label = document.getElementById('btn-process-label');
                const spinner = document.getElementById('btn-spinner');
                const statusBar = document.getElementById('status-bar');
                
                btn.disabled = true;
                if (label) label.textContent = 'Procesando…';
                if (spinner) spinner.classList.remove('hidden');
                if (statusBar) statusBar.textContent = 'procesando…';
                
                try {
                    const fd = new FormData();
                    fd.append('file', state.file);
                    
                    const res = await fetch('/remove-bg', { method: 'POST', body: fd });
                    const data = await res.json();
                    
                    if (!data.success) throw new Error(data.error);
                    
                    editor.setProcessedDataUrl(data.image);
                    await editor.loadImage(data.image, true);
                    
                    const btnExport = document.getElementById('btn-export');
                    if (btnExport) btnExport.disabled = false;
                    if (statusBar) statusBar.textContent = 'listo';
                    
                    const toast = document.getElementById('toast');
                    if (toast) {
                        toast.textContent = '✓ Fondo eliminado';
                        toast.classList.add('show');
                        setTimeout(() => toast.classList.remove('show'), 2500);
                    }
                    
                } catch (err) {
                    console.error('Error:', err);
                    const toast = document.getElementById('toast');
                    if (toast) {
                        toast.textContent = '✗ ' + err.message;
                        toast.classList.add('show');
                        setTimeout(() => toast.classList.remove('show'), 3000);
                    }
                    if (statusBar) statusBar.textContent = 'error';
                } finally {
                    btn.disabled = false;
                    if (label) label.textContent = 'Eliminar fondo';
                    if (spinner) spinner.classList.add('hidden');
                }
            });
        }
        
        // Exportar
        const btnExport = document.getElementById('btn-export');
        if (btnExport) {
            btnExport.addEventListener('click', async () => {
                const state = editor.getState();
                if (!state.isProcessed) return;
                
                const statusBar = document.getElementById('status-bar');
                if (statusBar) statusBar.textContent = 'exportando…';
                
                try {
                    const res = await fetch('/apply-mask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            original: state.processedDataUrl,
                            mask: editor.getMaskDataUrl()
                        })
                    });
                    const data = await res.json();
                    
                    if (data.success && data.image) {
                        const a = document.createElement('a');
                        a.href = data.image;
                        a.download = 'sin_fondo.png';
                        a.click();
                        
                        const toast = document.getElementById('toast');
                        if (toast) {
                            toast.textContent = '✓ PNG descargado';
                            toast.classList.add('show');
                            setTimeout(() => toast.classList.remove('show'), 2500);
                        }
                    } else {
                        throw new Error(data.error || 'Error desconocido');
                    }
                } catch (err) {
                    console.error('Error exportando:', err);
                    const compositeUrl = editor.getCompositeDataUrl();
                    if (compositeUrl) {
                        const a = document.createElement('a');
                        a.href = compositeUrl;
                        a.download = 'sin_fondo_local.png';
                        a.click();
                    }
                }
                
                if (statusBar) statusBar.textContent = 'listo';
            });
        }
        
        // Reset
        const btnReset = document.getElementById('btn-reset');
        if (btnReset) {
            btnReset.addEventListener('click', () => {
                if (confirm('¿Resetear todo?')) {
                    if (fileInput) fileInput.value = '';
                    if (emptyState && canvasContainer) {
                        emptyState.classList.remove('hidden');
                        canvasContainer.classList.add('hidden');
                    }
                    const btnProcess = document.getElementById('btn-process');
                    const btnExport = document.getElementById('btn-export');
                    if (btnProcess) btnProcess.disabled = true;
                    if (btnExport) btnExport.disabled = true;
                    
                    editor.reset();
                    
                    const statusBar = document.getElementById('status-bar');
                    if (statusBar) statusBar.textContent = 'listo';
                    
                    if (window.innerWidth <= 768) toggleSidebar();
                }
            });
        }
        
        // Keyboard shortcuts (solo desktop)
        document.addEventListener('keydown', (e) => {
            if (window.innerWidth > 768) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    editor.undo?.();
                } else if (e.ctrlKey && e.key === 'y') {
                    e.preventDefault();
                    editor.redo?.();
                } else if (e.key.toLowerCase() === 'e') {
                    if (editor.getState().tool !== 'erase') editor.toggleTool();
                } else if (e.key.toLowerCase() === 'a') {
                    if (editor.getState().tool !== 'add') editor.toggleTool();
                }
            }
        });
        
        // Cleanup
        window.addEventListener('beforeunload', () => editor.destroy());
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
    });
</script>
</body>
</html>
